<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4L</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
</head>
<body>
  <div class="contenedor">
    <div class="tarjeta-auth" style="max-width:460px;">
      <div class="tarjeta-auth__logo">4L</div>
      <p class="tarjeta-auth__subtitulo" data-i18n="onboarding_titulo">¡Bienvenido a 4L!</p>
      <p style="text-align:center; margin-bottom: var(--espacio-lg);" data-i18n="onboarding_intro">
        Antes de empezar, cuéntanos un poco sobre cómo quieres aprender.
      </p>

      <div id="zona-mensaje"></div>

      <form id="formulario-onboarding">
        <div class="campo">
          <label for="campo-idioma-principal" data-i18n="onboarding_label_principal">¿Cuál es tu idioma principal?</label>
          <select id="campo-idioma-principal"></select>
          <span class="campo__ayuda" data-i18n="onboarding_ayuda_principal">Se usará para la interfaz y como término principal en las tarjetas.</span>
        </div>

        <div class="campo">
          <label data-i18n="onboarding_label_activos">¿Qué idiomas quieres aprender a la vez?</label>
          <div id="lista-idiomas-activos" class="flex gap-md" style="flex-wrap:wrap;"></div>
          <span class="campo__ayuda" data-i18n="onboarding_ayuda_activos">Elige uno o varios. Podrás cambiarlo después en Ajustes.</span>
        </div>

        <button type="submit" class="boton boton--primario boton--bloque" id="boton-continuar" data-i18n="onboarding_boton_continuar">
          Empezar a aprender
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="js/paginas/onboarding.js"></script>
</body>
</html>
