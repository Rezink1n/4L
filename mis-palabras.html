<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4L</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
</head>
<body>
  <nav id="nav-app" class="nav-app"></nav>

  <main class="contenedor">
    <div class="cabecera-pagina">
      <h1 data-i18n="mispalabras_titulo">Mis palabras</h1>
      <p data-i18n="mispalabras_subtitulo">Añade tu propio vocabulario. Solo tú puedes verlo y editarlo.</p>
    </div>

    <form id="formulario-termino" class="tarjeta" style="margin-bottom: var(--espacio-lg);">
      <input type="hidden" id="campo-editando-id" value="" />

      <div class="campo">
        <label for="campo-nivel" data-i18n="mispalabras_label_nivel">Nivel</label>
        <select id="campo-nivel">
          <option value="A1">A1</option>
          <option value="A2">A2</option>
        </select>
      </div>

      <div class="campo">
        <label for="campo-categoria" data-i18n="mispalabras_label_categoria">Categoría (opcional)</label>
        <input type="text" id="campo-categoria" data-i18n-placeholder="mispalabras_placeholder_categoria" placeholder="p. ej. trabajo, viajes…" />
      </div>

      <div id="campos-idiomas"><!-- generado dinámicamente por js/paginas/misPalabras.js, uno por idioma --></div>

      <div class="flex gap-sm">
        <button type="submit" class="boton boton--primario" id="boton-guardar-termino" data-i18n="mispalabras_boton_anadir">Añadir palabra</button>
        <button type="button" class="boton boton--secundario oculto" id="boton-cancelar-edicion" data-i18n="mispalabras_boton_cancelar">Cancelar</button>
      </div>
    </form>

    <div id="zona-mis-terminos">
      <div class="estado">
        <span class="estado__icono girando">⏳</span>
        <p data-i18n="mispalabras_cargando">Cargando tus palabras…</p>
      </div>
    </div>
  </main>

  <script type="module" src="js/paginas/misPalabras.js"></script>
</body>
</html>
