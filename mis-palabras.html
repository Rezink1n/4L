<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mis palabras · 4L</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
</head>
<body>
  <nav id="nav-app" class="nav-app"></nav>

  <main class="contenedor">
    <div class="cabecera-pagina">
      <h1>Mis palabras</h1>
      <p>Añade tu propio vocabulario. Solo tú puedes verlo y editarlo.</p>
    </div>

    <form id="formulario-termino" class="tarjeta" style="margin-bottom: var(--espacio-lg);">
      <input type="hidden" id="campo-editando-id" value="" />

      <div class="campo">
        <label for="campo-nivel">Nivel</label>
        <select id="campo-nivel">
          <option value="A1">A1</option>
          <option value="A2">A2</option>
        </select>
      </div>

      <div class="campo">
        <label for="campo-categoria">Categoría (opcional)</label>
        <input type="text" id="campo-categoria" placeholder="p. ej. trabajo, viajes…" />
      </div>

      <div class="campo">
        <label for="campo-texto-es">Español</label>
        <input type="text" id="campo-texto-es" required />
      </div>
      <div class="campo">
        <label for="campo-texto-fr">Francés</label>
        <input type="text" id="campo-texto-fr" placeholder="opcional" />
      </div>
      <div class="campo">
        <label for="campo-texto-pt">Portugués</label>
        <input type="text" id="campo-texto-pt" placeholder="opcional" />
      </div>
      <div class="campo">
        <label for="campo-texto-it">Italiano</label>
        <input type="text" id="campo-texto-it" placeholder="opcional" />
      </div>

      <div class="flex gap-sm">
        <button type="submit" class="boton boton--primario" id="boton-guardar-termino">Añadir palabra</button>
        <button type="button" class="boton boton--secundario oculto" id="boton-cancelar-edicion">Cancelar</button>
      </div>
    </form>

    <div id="zona-mis-terminos">
      <div class="estado">
        <span class="estado__icono girando">⏳</span>
        <p>Cargando tus palabras…</p>
      </div>
    </div>
  </main>

  <script type="module" src="js/paginas/misPalabras.js"></script>
</body>
</html>
